<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Stark Mods - Premium Mods for RC25, RC20, WCC3 and more." />
  <title>Stark Mods</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/icons/stark-32.png">
  <link rel="icon" type="image/x-icon" href="/assets/icons/stark_store.png">
  <link rel="shortcut icon" href="/assets/icons/stark.ico">

  <!-- Make all relative paths resolve from site root -->
  <base href="/" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>

  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <!-- Custom Styles -->
  <link rel="stylesheet" href="/css/styles.css" />
</head>

<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 antialiased transition-colors duration-300">

  <!-- ===== HEADER (iOS Style: Hamburger Left, Logo Center, Cart Right) ===== -->
  <header class="glass-header sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6">
      <div class="flex items-center justify-between h-14">

        <!-- LEFT: Hamburger Menu Button (No glass bg) -->
        <div class="flex items-center gap-2">
          <button id="mobile-menu-button"
                  class="p-2 rounded-xl text-slate-600 dark:text-slate-300 transition-all active:scale-95 hover:bg-black/5 dark:hover:bg-white/10">
            <span class="material-icons text-[24px]">menu</span>
          </button>

          <!-- ADMIN ICON (only for admin; visibility controlled by JS) -->
          <button id="admin-panel-btn"
                  onclick="window.router.navigateTo('/admin')"
                  class="hidden p-2 rounded-xl text-slate-600 dark:text-slate-300 transition-all active:scale-95 hover:bg-black/5 dark:hover:bg-white/10">
            <span class="material-icons text-xl">admin_panel_settings</span>
          </button>
        </div>

        <!-- CENTER: Logo (white filter in dark mode) -->
        <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2">
          <a href="/" data-link class="block">
            <img src="/assets/icons/starkmodslogo.png" alt="Stark Mods"
                 class="h-9 sm:h-10 object-contain header-logo"
                 onerror="this.onerror=null; this.style.display='none'; this.parentElement.innerHTML='<span class=\'text-lg font-bold\'>Stark Mods</span>';" />
          </a>
        </div>

        <!-- RIGHT: Cart Icon (No glass bg) -->
        <div class="flex items-center gap-2">
          <!-- Theme Toggle (desktop only) -->
          <button id="theme-toggle"
                  class="hidden sm:flex p-2 rounded-xl text-slate-600 dark:text-slate-300 transition-all active:scale-95 hover:bg-black/5 dark:hover:bg-white/10">
            <span id="theme-icon" class="material-icons text-xl">dark_mode</span>
          </button>

          <!-- Cart -->
          <button onclick="window.router.navigateTo('/cart')"
                  class="relative p-2 rounded-xl text-slate-600 dark:text-slate-300 transition-all active:scale-95 hover:bg-black/5 dark:hover:bg-white/10">
            <span class="material-icons text-[24px]">shopping_bag</span>
            <span id="cart-badge"
                  class="hidden absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[10px] font-bold w-[18px] h-[18px] flex items-center justify-center rounded-full border-2 border-white dark:border-slate-900 shadow-sm">
              0
            </span>
          </button>
        </div>
      </div>
    </div>

    <!-- SLIDE-DOWN MENU -->
    <div id="mobile-menu"
         class="hidden border-t border-slate-200/50 dark:border-slate-700/50 bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl shadow-2xl absolute w-full left-0 z-40 transition-all">
      <div class="max-w-lg mx-auto px-4 py-4 space-y-1">
        <a href="/" class="flex items-center gap-3 mobile-link py-3 px-4 rounded-2xl hover:bg-slate-100/80 dark:hover:bg-slate-800/80 font-medium transition-colors" data-link>
          <span class="material-icons text-xl text-blue-500">home</span>
          <span>Home</span>
        </a>
        <a href="/creator" class="flex items-center gap-3 mobile-link py-3 px-4 rounded-2xl hover:bg-slate-100/80 dark:hover:bg-slate-800/80 font-medium transition-colors" data-link>
          <span class="material-icons text-xl text-purple-500">build</span>
          <span>Mod Creator</span>
        </a>
        <a href="/contact" class="flex items-center gap-3 mobile-link py-3 px-4 rounded-2xl hover:bg-slate-100/80 dark:hover:bg-slate-800/80 font-medium transition-colors" data-link>
          <span class="material-icons text-xl text-green-500">mail</span>
          <span>Contact</span>
        </a>
        <a href="/cart" class="flex items-center gap-3 mobile-link py-3 px-4 rounded-2xl hover:bg-slate-100/80 dark:hover:bg-slate-800/80 font-medium transition-colors" data-link>
          <span class="material-icons text-xl text-orange-500">shopping_bag</span>
          <span>My Cart</span>
        </a>
        <a href="/profile" class="flex items-center gap-3 mobile-link py-3 px-4 rounded-2xl hover:bg-slate-100/80 dark:hover:bg-slate-800/80 font-medium transition-colors" data-link>
          <span class="material-icons text-xl text-pink-500">person</span>
          <span>My Profile</span>
        </a>
        <a href="/admin" class="flex items-center gap-3 mobile-link py-3 px-4 rounded-2xl hover:bg-slate-100/80 dark:hover:bg-slate-800/80 font-medium transition-colors" data-link
           id="mobile-admin-link" style="display:none;">
          <span class="material-icons text-xl text-red-500">admin_panel_settings</span>
          <span>Admin Panel</span>
        </a>

        <!-- Divider -->
        <div class="h-px bg-slate-200/60 dark:bg-slate-700/60 my-2"></div>

        <!-- Mobile Auth Container -->
        <div id="mobile-auth-container"></div>

        <!-- Mobile Theme Toggle -->
        <button id="theme-toggle-mobile"
                class="w-full flex items-center gap-3 py-3 px-4 rounded-2xl hover:bg-slate-100/80 dark:hover:bg-slate-800/80 font-medium text-slate-600 dark:text-slate-300 transition-colors">
          <span class="material-icons text-xl text-amber-500">dark_mode</span>
          <span>Dark Mode</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Desktop Auth Container (hidden, keeps old logic working) -->
  <div id="auth-container" class="hidden"></div>

  <!-- ===== MAIN CONTENT (Router injects here) ===== -->
  <main id="app-content" class="max-w-6xl mx-auto px-4 sm:px-6 py-10 min-h-[60vh]">
    <div class="flex justify-center pt-20">
      <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="mt-auto border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 transition-colors duration-300 pb-28">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 py-8">
      <div class="flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="text-sm font-medium text-slate-600 dark:text-slate-400">
          &copy; 2025 Stark Mods. All rights reserved.
        </div>
        <div class="flex gap-6 text-sm text-slate-500">
          <a href="/privacy" class="hover:text-blue-600 dark:hover:text-blue-400 transition" data-link>Privacy</a>
          <a href="/terms" class="hover:text-blue-600 dark:hover:text-blue-400 transition" data-link>Terms</a>
        </div>
      </div>
    </div>
  </footer>

<!-- ===== iOS FLOATING DOCK ===== -->
<nav id="ios-dock" class="fixed bottom-5 left-1/2 -translate-x-1/2 z-[9999]">
  <div class="ios-dock-pill">

    <!-- Home -->
    <button onclick="window.router.navigateTo('/')" class="ios-dock-item" data-dock="home" title="Home">
      <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 11.4V20a1 1 0 001 1h4a1 1 0 001-1v-4.5a1 1 0 011-1h2a1 1 0 011 1V20a1 1 0 001 1h4a1 1 0 001-1v-8.6"/>
        <path d="M2.5 12L12 3.5 21.5 12"/>
      </svg>
    </button>

    <!-- Mod Creator (Magic Wand) -->
    <button onclick="window.router.navigateTo('/creator')" class="ios-dock-item" data-dock="creator" title="Mod Creator">
      <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 4l5 5L7.5 21.5 2 22l.5-5.5L15 4z"/>
        <path d="M13 6l5 5"/>
        <path d="M19 2l1 1.5L21.5 5 20 5.5 18.5 7 18 5.5 16.5 4 18 3.5z"/>
      </svg>
    </button>

    <!-- Profile -->
    <button onclick="window.router.navigateTo('/profile')" class="ios-dock-item" data-dock="profile" title="Profile">
      <svg viewBox="0 0 24 24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="8" r="4"/>
        <path d="M5.5 21a7.5 7.5 0 0113 0"/>
      </svg>
    </button>

  </div>
</nav>

  <!-- FIREBASE SDKs (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

  <!-- Your Scripts (absolute paths!) -->
  <script src="/js/firebase-config.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/router.js"></script>

</body>
</html>
